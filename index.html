<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#00658c" />

    <title>QR Generator — Crea códigos QR | Dotrino</title>
    <meta name="description" content="Generador de códigos QR gratis: crea un QR de un enlace, texto, red Wi-Fi, contacto, correo o ubicación y descárgalo en PNG o SVG. Todo en tu navegador, sin trackers ni cuentas." />
    <link rel="canonical" href="https://qrgenerator.dotrino.com/" />

    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="QR Generator" />

    <!-- Open Graph / Twitter (cáscara pública, sin datos de usuario) -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:site_name" content="Dotrino" />
    <meta property="og:title" content="QR Generator — Crea códigos QR" />
    <meta property="og:description" content="Crea un QR de un enlace, texto, Wi-Fi, contacto o ubicación y descárgalo en PNG o SVG. Todo en tu navegador, sin trackers." />
    <meta property="og:url" content="https://qrgenerator.dotrino.com/" />
    <meta property="og:image" content="https://qrgenerator.dotrino.com/og.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="QR Generator — Crea códigos QR" />
    <meta name="twitter:description" content="Crea un QR de un enlace, texto, Wi-Fi, contacto o ubicación y descárgalo en PNG o SVG. Sin trackers." />
    <meta name="twitter:image" content="https://qrgenerator.dotrino.com/og.jpg" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "QR Generator",
        "url": "https://qrgenerator.dotrino.com/",
        "description": "Generador de códigos QR: crea un QR de un enlace, texto, Wi-Fi, contacto o ubicación y descárgalo en PNG o SVG.",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "publisher": { "@type": "Organization", "name": "Dotrino", "url": "https://dotrino.com/" }
      }
    </script>

    <!-- Analítica cookieless autohospedada (GoatCounter); no cuenta en localhost/LAN. -->
    <script>window.goatcounter = { path: function (p) { return location.hostname + p } }</script>
    <script data-goatcounter="https://goat.dotrino.com/count" async src="https://goat.dotrino.com/count.js"></script>
  </head>
  <body>
    <!-- Topbar estándar del ecosistema (CONVENCIONES §5): marca + volver + idioma
         + perfil + moneda de support. Vive FUERA de #app porque el render de la app
         reescribe ese contenedor entero y destruiría el componente en cada cambio. -->
    <dotrino-topbar
      id="topbar"
      brand="QR Generator"
      icon="/icon.svg"
      brand-href="./"
      profile
      support-href="https://ko-fi.com/dotrino"
      support-repo="imdotrino/dotrino-qrgenerator"
      support-discord="https://discord.gg/D648uq7cth"
    >
      <dotrino-install id="install" slot="end"></dotrino-install>
    </dotrino-topbar>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
